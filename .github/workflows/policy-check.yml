name: Policy Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  external-policy:
    uses: hamanpaul/paulsha-conventions/.github/workflows/reusable-policy-check.yml@484f963adddf384d30fa0dd85aef35dddf822ee7
    with:
      policy_profile: flat
      policy_version: "1.0.5"
      policy_engine_ref: 484f963adddf384d30fa0dd85aef35dddf822ee7

  release-governance:
    runs-on: ubuntu-latest
    needs: external-policy

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install project and test dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Validate release governance policy
        run: uv run pytest -q tests/test_release_governance.py
