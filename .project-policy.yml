version: 1
project: testpilot
policy_profile: flat
policy_version: "1.0.10"
tier: work
policy:
  config_name: .project-policy.yml
  release_version_source: VERSION
  required_checks:
    - release-version
    - cli-help-sync
    - policy-config
    - agent-instructions-sync
cli:
  - command: "bash scripts/policy_cli_help.sh"
    help_args: ["--help"]
    reflected_in: "README.md"
    marker: "testpilot-help"
  - command: "bash scripts/policy_cli_help.sh"
    help_args: ["--update", "--help"]
    reflected_in: "README.md"
    marker: "testpilot-update-help"
policy_check:
  repository: hamanpaul/paulsha-conventions
  config: .project-policy.yml
  pin_required: true
  workflow_ref: hamanpaul/paulsha-conventions/.github/workflows/reusable-policy-check.yml@ee87a6d5ed91209d944934a2559f4f2622fd1ac2
